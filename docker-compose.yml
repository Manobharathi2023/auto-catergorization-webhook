version: "3.9"

services:
  app:
    build: .
    container_name: auto-categorization-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PRIMARY_MODEL=llama3
      - FALLBACK_MODEL=mistral
      - DATABASE_URL=sqlite:///./ticket_logs.db
      - CONFIDENCE_THRESHOLD=0.6
    volumes:
      - ./ticket_logs.db:/app/ticket_logs.db
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp:
    build: .
    container_name: auto-categorization-mcp
    command: python mcp/server.py --transport http --port 8001
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull llama3 model on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull llama3 && wait"]

volumes:
  ollama_data:
